# Example: TLS reverse proxy to Gunicorn on 127.0.0.1:8002
# sudo cp deploy/nginx-face-attendance.conf /etc/nginx/sites-available/face-attendance
# Edit server_name and ssl_certificate paths, then enable the site.

upstream face_attendance {
    server 127.0.0.1:8002;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name attendance.example.com;

    ssl_certificate     /etc/letsencrypt/live/attendance.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance.example.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://face_attendance;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name attendance.example.com;
    return 301 https://$host$request_uri;
}
