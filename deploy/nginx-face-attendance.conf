# ─────────────────────────────────────────────────────────────────────────────
# Face Recognition Attendance  – nginx site config
# Multi-site friendly: lives in /etc/nginx/sites-available/face-attendance
# Enable with: sudo ln -sf /etc/nginx/sites-available/face-attendance \
#                           /etc/nginx/sites-enabled/face-attendance
#
# Tuned for 600-second proxy timeout (face recognition on slow hardware).
# Camera requires HTTPS (or http://localhost). See HTTPS section below.
# ─────────────────────────────────────────────────────────────────────────────

# Gunicorn upstream — bound to loopback only
upstream face_attendance_upstream {
    server 127.0.0.1:8002;
    keepalive 8;
}

# ── HTTP: plain IP access (camera will be blocked by browser) ────────────────
# Useful for API testing and health checks.
# Once you have a domain + Let's Encrypt, remove this block and keep HTTPS only.
server {
    listen 80;
    server_name 72.61.240.38 _;

    # ── Timeouts tuned for 600-second face-recognition requests ──────────────
    proxy_connect_timeout  10s;
    proxy_send_timeout     620s;
    proxy_read_timeout     620s;
    send_timeout           620s;

    # Webcam frames and training images can be up to ~5 MB
    client_max_body_size   25m;
    client_body_timeout    30s;

    # ── Static assets: served directly by nginx for speed ────────────────────
    location /assets/ {
        alias /opt/face-attendance/static/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Everything else → Gunicorn ───────────────────────────────────────────
    location / {
        proxy_pass         http://face_attendance_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Mirror the per-server timeouts inside the proxy block
        proxy_connect_timeout 10s;
        proxy_send_timeout    620s;
        proxy_read_timeout    620s;

        # Buffer tuning (large enough for base64 image payloads)
        proxy_buffer_size          64k;
        proxy_buffers              8 64k;
        proxy_busy_buffers_size    128k;
    }
}

